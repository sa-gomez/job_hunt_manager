<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 260px;
      padding: 16px;
      color: #111827;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .profile-name {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-name strong { color: #374151; }
    button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .primary { background: #4f46e5; color: #fff; }
    .primary:not(:disabled):hover { background: #4338ca; }
    .secondary { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .secondary:not(:disabled):hover { background: #e5e7eb; }
    .status {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      min-height: 18px;
      margin-top: 4px;
    }
    .status.success { color: #059669; }
    .status.error { color: #dc2626; }
    .unsupported {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
      padding: 8px 0;
    }
    .fill-preview {
      margin-top: 10px;
      border-top: 1px solid #e5e7eb;
      padding-top: 8px;
    }
    .fill-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
    }
    .fill-summary:hover { color: #374151; }
    .fill-table {
      display: none;
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.7;
      max-height: 220px;
      overflow-y: auto;
    }
    .fill-table.open { display: block; }
    .fill-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 4px;
    }
    .fill-key { color: #9ca3af; }
    .fill-val { color: #111827; word-break: break-all; }
    .fill-val.empty { color: #d1d5db; }
    .fill-section {
      font-weight: 600;
      color: #6b7280;
      margin-top: 6px;
      margin-bottom: 2px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <h1>Job Hunt Manager</h1>
  <div id="root"></div>
  <script src="popup.js"></script>
</body>
</html>
